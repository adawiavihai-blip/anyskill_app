<!DOCTYPE html>
<html>
<head>
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- MUST BE FIRST: Firebase App Check debug token for localhost.          -->
  <!-- This script is inline (no defer/async) so it executes synchronously  -->
  <!-- before ANY other script — including flutter.js and app_init.js.      -->
  <!-- The Firebase JS SDK reads window.FIREBASE_APPCHECK_DEBUG_TOKEN        -->
  <!-- during initializeAppCheck(); setting it here guarantees it is ready. -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <script>
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      self.FIREBASE_APPCHECK_DEBUG_TOKEN = '63E5824D-911F-4C8D-9452-E8ACF2438D95';
      console.log(
        '%c[AnySkill] App Check debug token injected for localhost: ' +
        self.FIREBASE_APPCHECK_DEBUG_TOKEN,
        'color: #6366F1; font-weight: bold;'
      );
    }
  </script>

  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- ── Security headers ───────────────────────────────────────────────── -->
  <!-- CSP is ALSO enforced as an HTTP response header in firebase.json      -->
  <!-- (HTTP headers take precedence over meta tags and survive SW cache).   -->
  <!-- connect-src covers: Firebase v1 (cloudfunctions.net), Firebase v2    -->
  <!-- Cloud Run direct (*.a.run.app), and any redirect hops (*.run.app).   -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'
                   https://*.googleapis.com
                   https://*.gstatic.com
                   https://www.google.com
                   https://accounts.google.com
                   https://www.recaptcha.net
                   https://recaptcha.google.com
                   https://js.stripe.com
                   https://appleid.cdn-apple.com;
                 style-src 'self' 'unsafe-inline'
                   https://fonts.googleapis.com;
                 font-src 'self'
                   https://fonts.gstatic.com;
                 img-src 'self' data: blob:
                   https://*.googleapis.com
                   https://*.gstatic.com
                   https://firebasestorage.googleapis.com
                   https://*.firebasestorage.app
                   https://img.youtube.com
                   https://images.unsplash.com
                   https://*.stripe.com;
                 connect-src 'self' blob:
                   https://*.googleapis.com
                   https://*.gstatic.com
                   https://*.firebaseio.com
                   https://*.firebasestorage.app
                   https://firebasestorage.googleapis.com
                   https://firestore.googleapis.com
                   https://identitytoolkit.googleapis.com
                   https://securetoken.googleapis.com
                   https://firebase.googleapis.com
                   https://*.firebaseapp.com
                   https://*.web.app
                   https://www.google.com
                   https://accounts.google.com
                   https://www.recaptcha.net
                   https://*.cloudfunctions.net
                   https://*.run.app
                   https://*.a.run.app
                   wss://*.firebaseio.com
                   https://api.stripe.com
                   https://*.stripe.com
                   https://appleid.apple.com;
                 frame-src 'self'
                   https://www.youtube.com
                   https://www.google.com
                   https://accounts.google.com
                   https://www.recaptcha.net
                   https://recaptcha.google.com
                   https://anyskill-6fdf3.firebaseapp.com
                   https://anyskill-6fdf3.web.app
                   https://js.stripe.com
                   https://hooks.stripe.com
                   https://appleid.apple.com;
                 worker-src 'self' blob:;
                 object-src 'none';
                 base-uri 'self';">
  <!-- Prevents this page from being embedded in iframes (clickjacking) -->
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <!-- Stops browsers from MIME-sniffing the content type -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <!-- Referrer policy: send origin only, no full URL in Referer header -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>AnySkill Elite</title>
  <!-- app version — bump this string on every release to bust browser cache -->
  <meta name="app-version" content="8.9.4">
  <meta name="build-id" content="20260531-v4">

  <!-- ── Google Sign-In client ID (used by google_sign_in web plugin) ──── -->
  <meta name="google-signin-client_id" 
        content="281981409319-nck912ajndlmnagiiqm32mdahferap04.apps.googleusercontent.com">
  <!-- ── PWA / installability ───────────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366F1">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Safari install & PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AnySkill">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  <!-- Startup image prevents white flash on launch from iOS home screen -->
  <link rel="apple-touch-startup-image" href="icons/Icon-512.png">

  <!-- Splash / tile colours for Windows / Android -->
  <meta name="msapplication-TileColor" content="#1E1B4B">
  <meta name="msapplication-TileImage" content="icons/Icon-192.png">

  <!-- Google Maps -->
  <script src="Maps.js" defer></script>

  <!-- Stripe.js — must load before Flutter initialises the Stripe SDK.
       flutter_stripe injects this dynamically, but an explicit tag is more
       reliable and ensures it is available before any Stripe call fires.
       The CSP above whitelists js.stripe.com for both script-src and frame-src. -->
  <script src="https://js.stripe.com/v3/" async></script>

  <!-- Flutter engine — חייב להיטען לפני app_init.js -->
  <script src="flutter.js?v=1748700000" defer></script>

  <!-- אתחול Flutter + רישום Service Worker -->
  <script src="app_init.js?v=1748700000" defer></script>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f7f9;">
</body>
</html>
